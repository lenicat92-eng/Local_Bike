version: 2

models:
  - name: stg_local_bike_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: store_id
        tests:
          - not_null

      - name: staff_id
        tests:
          - not_null

  - name: stg_local_bike_order_items
    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: list_price
        tests:
          - not_null

  - name: stg_local_bike_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: brand_id
        tests:
          - not_null

      - name: category_id
        tests:
          - not_null